spring:
  application:
    name: Department_Management
  #mysql连接配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/management
    username: root
    password: 111111

#服务器配置
server:
  port: 8080
  #如果需要启用HTTPS，取消以下注释并配置证书
  #ssl:
  #  enabled: true
  #  key-store: classpath:keystore.p12
  #  key-store-password: your-password
  #  key-store-type: PKCS12
mybatis:
  mapper-locations: classpath:test/zsc/management/mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #驼峰命名转换
    #要求数据库字段名必须使用下划线分隔单词,而Java对象属性名必须使用驼峰命名法。
    #是建立在 convention之上的,即Java对象属性名必须与数据库字段名一致。
    map-underscore-to-camel-case: true
    #spring事务管理日志
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

#   简单来讲就是关于事务管理相关的日志debug级别的日志也要看到，
#   因为整个logback的日志级别设置为了info，如果设置为了debug将会有非常多的日志，
#   所以单独设置可以看到这个debug级别的日志

# 阿里云OSS配置
# 注意: 请通过环境变量设置 OSS_ACCESS_KEY_ID 和 OSS_ACCESS_KEY_SECRET
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: java-tset-zsc-01
    region: cn-beijing

# JWT配置
jwt:
  sign-key: ${JWT_SIGN_KEY:SVRIRUlNQQ==}  # 优先从环境变量读取，否则使用默认值
  expire: 43200000  # 12小时（毫秒）
